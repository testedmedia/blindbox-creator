name: Jules Review (Gemini 2.5 Pro)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label-for-jules:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add Jules label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['jules']
            });
            console.log(`Labeled PR #${context.issue.number} for Jules review`);

  jules-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Jules Code Review
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: |
            Review this pull request for bugs, security issues, and logic errors.
            Focus on:
            - Trading logic correctness (edge calculations, position sizing, risk limits)
            - API integration safety (rate limiting, error handling, retries)
            - Database query efficiency (async sessions, connection pooling)
            - Security (no hardcoded keys, proper env var usage)
            - Celery task reliability (idempotency, timeout handling)
            - Python best practices and type safety
            This is a real-money Polymarket trading system. Any bug can lose money.
            Post your review as a PR comment with specific file:line references.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          include_last_commit: true
          include_commit_log: true
