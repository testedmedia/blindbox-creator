name: Jules Review (Gemini 2.5 Pro)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label-for-jules:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add Jules label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'jules' });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'jules', color: '7C3AED', description: 'Reviewed by Jules (Gemini Pro)' });
              }
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['jules']
            });
            console.log(`Labeled PR #${context.issue.number} for Jules review`);
